<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us| Hi Hello World 3</title>
    <title>Contact Us| Hi Hello World!</title>
    <title>test</title>
    <title>hi</title>
    <style>
      :root {
        --ink: #172033;
        --muted: #6b7280;
        --surface: rgba(255, 255, 255, 0.84);
        --line: rgba(23, 32, 51, 0.09);
        --primary: #5b4cf0;
        --secondary: #1db7a3;
      }
      * {
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f8fc;
        color: var(--ink);
        font-family: Inter, system-ui, sans-serif;
      }
      .orb {
        position: fixed;
        width: 34rem;
        aspect-ratio: 1;
        border-radius: 50%;
        filter: blur(10px);
        opacity: 0.48;
        pointer-events: none;
      }
      .purple {
        top: -16rem;
        left: -13rem;
        background: #b9b4ff;
      }
      .mint {
        right: -14rem;
        bottom: -15rem;
        background: #9de5d8;
      }
      main {
        width: min(92vw, 760px);
        padding: 1.25rem;
      }
      nav {
        display: flex;
        justify-content: flex-start;
        gap: 1.25rem;
        margin-bottom: 1rem;
        padding: 0 0.5rem;
      }
      nav a {
        color: var(--ink);
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
      }
      nav a:hover,
      nav a[aria-current="page"] {
        color: var(--primary);
      }
      article {
        padding: clamp(2.4rem, 8vw, 4.4rem);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        box-shadow: 0 25px 70px rgba(47, 55, 90, 0.16);
        backdrop-filter: blur(18px);
      }
      .accent {
        width: 54px;
        height: 8px;
        margin-bottom: 2rem;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
      }
      .eyebrow {
        margin: 0 0 0.75rem;
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: clamp(3rem, 9vw, 6rem);
        line-height: 0.95;
        letter-spacing: -0.07em;
      }
      h1 span {
        color: var(--primary);
      }
      .intro {
        margin: 1.25rem 0 1.8rem;
        color: var(--muted);
        font-size: 1.06rem;
        line-height: 1.7;
      }
      form {
        display: grid;
        gap: 1rem;
      }
      label {
        display: grid;
        gap: 0.45rem;
        font-size: 0.86rem;
        font-weight: 750;
      }
      input,
      textarea {
        width: 100%;
        padding: 0.85rem 1rem;
        border: 1px solid var(--line);
        border-radius: 12px;
        outline: none;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        font: inherit;
      }
      input:focus,
      textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(91, 76, 240, 0.12);
      }
      textarea {
        min-height: 105px;
        resize: vertical;
      }
      button {
        width: max-content;
        padding: 0.85rem 1.25rem;
        border: 0;
        border-radius: 12px;
        background: var(--primary);
        color: white;
        font: inherit;
        font-weight: 750;
        cursor: pointer;
      }
      button:hover {
        background: #4739d1;
      }
      @media (max-width: 500px) {
        article {
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="orb purple"></div>
    <div class="orb mint"></div>
    <main>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a><a href="about.html">About</a
        ><a href="contact.html" aria-current="page">Contact</a>
      </nav>
      <article>
        <div class="accent"></div>
        <p class="eyebrow">Get in touch</p>
        <h1>Let's make it <span>happen.</span></h1>
        <p class="intro">
          Have an idea, question, or simply want to say hello? Send a message
          and we'll get back to you.
        </p>
        <form action="#" method="post">
          <label
            >Name<input
              type="text"
              name="name"
              autocomplete="name"
              placeholder="Your name"
              required /></label
          ><label
            >Email<input
              type="email"
              name="email"
              autocomplete="email"
              placeholder="you@example.com"
              required /></label
          ><label
            >Message<textarea
              name="message"
              placeholder="How can we help?"
              required
            ></textarea></label
          ><button type="submit">Send message</button>
        </form>
      </article>
    </main>
  </body>
</html>
