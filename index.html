<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A polished Hello World landing page." />
    <title>Hello World!</title>
    <style>
      :root {
        --ink: #172033;
        --muted: #6b7280;
        --surface: rgba(255, 255, 255, 0.84);
        --line: rgba(23, 32, 51, 0.09);
        --primary: #5b4cf0;
        --secondary: #1db7a3;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #f7f8fc;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .orb {
        position: fixed;
        width: 34rem;
        aspect-ratio: 1;
        border-radius: 50%;
        filter: blur(10px);
        opacity: 0.48;
        pointer-events: none;
      }

      .orb--purple { top: -16rem; left: -13rem; background: #b9b4ff; }
      .orb--mint { right: -14rem; bottom: -15rem; background: #9de5d8; }

      main {
        width: min(92vw, 760px);
        padding: 1.25rem;
      }

      nav { display: flex; justify-content: flex-start; gap: 1.25rem; margin-bottom: 1rem; padding: 0 0.5rem; }
      nav a { color: var(--ink); font-size: 0.9rem; font-weight: 700; text-decoration: none; }
      nav a:hover, nav a[aria-current="page"] { color: var(--primary); }

      .card {
        position: relative;
        overflow: hidden;
        padding: clamp(2.4rem, 8vw, 5.5rem);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        box-shadow: 0 25px 70px rgba(47, 55, 90, 0.16);
        backdrop-filter: blur(18px);
      }

      .accent {
        width: 54px;
        height: 8px;
        margin-bottom: 2rem;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 620px;
        margin: 0;
        font-size: clamp(3.3rem, 10vw, 7rem);
        line-height: 0.94;
        letter-spacing: -0.075em;
      }

      h1 span {
        color: var(--primary);
      }

      .message {
        max-width: 470px;
        margin: 1.7rem 0 2.2rem;
        color: var(--muted);
        font-size: clamp(1rem, 2.5vw, 1.18rem);
        line-height: 1.7;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.75rem 1rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        font-size: 0.9rem;
        font-weight: 650;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.14);
      }

      .sparkle {
        position: absolute;
        top: 2.25rem;
        right: 2.4rem;
        color: var(--secondary);
        font-size: 2rem;
      }

      @media (max-width: 500px) {
        .card { border-radius: 22px; }
        .sparkle { top: 1.3rem; right: 1.5rem; font-size: 1.45rem; }
      }
    </style>
  </head>
  <body>
    <div class="orb orb--purple"></div>
    <div class="orb orb--mint"></div>
    <main>
      <nav aria-label="Main navigation">
        <a href="index.html" aria-current="page">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <section class="card" aria-labelledby="greeting">
        <div class="sparkle" aria-hidden="true">✦</div>
        <div class="accent" aria-hidden="true"></div>
        <p class="eyebrow">A fresh beginning</p>
        <h1 id="greeting">Hello, <span>World!</span></h1>
        <p class="message">Every great idea starts somewhere. This is yours—clean, clear, and ready for what comes next.</p>
        <div class="status"><span class="dot" aria-hidden="true"></span> Everything is ready</div>
      </section>
    </main>
  </body>
</html>
